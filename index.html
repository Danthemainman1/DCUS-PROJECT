    <style>
        /* 1. Visual Immersion: The Desk Environment */
        body {
            /* Wood-grain desk background */
            background-color: #3b2413;
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.6) 0px, rgba(0,0,0,0.2) 2px, transparent 4px, transparent 146px, rgba(0,0,0,0.2) 148px, rgba(0,0,0,0.6) 150px),

                linear-gradient(45deg, rgba(0,0,0,0.05) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.05) 75%, rgba(0,0,0,0.05));
            background-size: 150px 100%, 100% 100%, 60px 60px;
            margin: 0;
            transition: background-color 0.5s ease;
        }

        /* Vignette Effect */
        .vignette {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 50;
        }

        /* Dynamic Lighting */
        .lighting-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 40;
            transition: all 0.8s ease;
        }
        
        body.lamp-on .lighting-overlay {
            background: radial-gradient(circle at 60% 30%, rgba(255, 230, 150, 0.1) 0%, rgba(0, 0, 0, 0.6) 90%);
            mix-blend-mode: multiply;
        }

        body.lamp-off .lighting-overlay {
            background: radial-gradient(circle at 50% 50%, rgba(30, 50, 80, 0.4) 0%, rgba(5, 10, 20, 0.85) 100%);
            mix-blend-mode: hard-light;
        }

        /* The Notebook */
        .notebook-cover {
            box-shadow: 15px 15px 30px rgba(0,0,0,0.6), inset 2px 0 5px rgba(255,255,255,0.2);
            border-radius: 4px 15px 15px 4px;
            position: relative;
            z-index: 10;
        }

        .notebook-spine {
            background: linear-gradient(to right, #2d2115 0%, #4a3728 20%, #2d2115 100%);
            border-radius: 4px 0 0 4px;
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.5);
            z-index: 30;
        }

        /* Paper Crinkle & Texture */
        .diary-paper {
            background-color: #fdf5e6;
            background-image: 
                repeating-linear-gradient(transparent, transparent 31px, #a3c8ed 31px, #a3c8ed 32px),
                url('data:image/svg+xml;utf8,<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><filter id="noiseFilter"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noiseFilter)" opacity="0.05"/></svg>');
            line-height: 32px;
            position: relative;
            padding-top: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1);
            transform-origin: left center;
        }

        .diary-paper::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 50px;
            width: 2px;
            background-color: rgba(240, 128, 128, 0.7);
            z-index: 0;
        }

        /* Coffee Stain Overlay */
        .coffee-stain {
            position: absolute;
            width: 120px; height: 110px;
            background: radial-gradient(circle, transparent 40%, rgba(139, 69, 19, 0.15) 60%, rgba(139, 69, 19, 0.4) 65%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            transform: scaleY(0.9) rotate(15deg);
        }

        .diary-content {
            position: relative;
            z-index: 1;
            padding-left: 65px;
            padding-right: 20px;
        }

        /* 2. Enhanced Ephemera & Tape */
        .ephemera-container {
            float: right;
            margin: 5px 0 15px 20px;
            position: relative;
            z-index: 10;
        }

        .polaroid {
            background: #ffffff;
            padding: 10px 10px 25px 10px;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.3);
            width: 220px;
            transition: transform 0.3s ease;
        }
        
        .polaroid img {
            width: 100%; height: 180px;
            object-fit: cover;
            border: 1px solid #e5e5e5;
            filter: sepia(0.4) contrast(1.1) brightness(0.9) grain(0.5);
        }

        .movie-ticket {
            background: #f4d03f;
            border: 2px dashed #b7950b;
            padding: 10px;
            font-family: 'Courier Prime', monospace;
            text-align: center;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.2);
            color: #111;
            width: 180px;
        }

        .news-clipping {
            background: #eeebe1;
            padding: 15px;
            font-family: 'Times New Roman', serif;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.2);
            width: 220px;
            border: 1px solid #ccc;
        }

        .doodle {
            background: transparent;
            color: #1a1a2e;
            font-family: 'Permanent Marker', cursive;
            font-size: 1.5rem;
            transform: rotate(-5deg);
            opacity: 0.8;
            padding: 10px;

            position: absolute;
            background: rgba(255, 255, 220, 0.4);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            height: 25px;
            width: 80px;
            z-index: 15;
            backdrop-filter: sepia(0.5) blur(1px);
        }

        .tape-top { top: -10px; left: 50%; transform: translateX(-50%) rotate(-3deg); }
        .tape-bottom { bottom: -10px; right: 10px; transform: rotate(5deg); width: 60px; }

        @media (max-width: 640px) {
            .ephemera-container {
                float: none;
                margin: 10px auto 20px auto;
                display: block;
                width: max-content;
            }
        }

        /* 3. The Ribbon Ritual */
        #ribbon-container {
            position: absolute;
            right: -20px;
            top: 150px;
            opacity: 0;
            transition: opacity 0.5s ease, transform 0.5s ease;
            transform: translateX(20px);
            z-index: 20;
            pointer-events: none;
        }
        #ribbon-container.visible {
            opacity: 1;
            transform: translateX(0);
        }
        .yellow-ribbon {
            width: 40px;
            height: 120px;
            background: #f1c40f;
            border-radius: 5px;
            box-shadow: -2px 5px 10px rgba(0,0,0,0.3);
            position: relative;
        }
        .yellow-ribbon::after {
            content: '';
            position: absolute;
            bottom: -20px; left: 0;
            border-left: 20px solid #f1c40f;
            border-right: 20px solid #f1c40f;
            border-bottom: 20px solid transparent;
        }

        /* 4. Technical Polish: Page Turn & Glossary */
        .page-flip-out {
            transform: rotateY(-90deg);
            opacity: 0;
            transition: transform 0.4s ease-in, opacity 0.2s ease-in;
        }

        .page-flip-in {
            transform: rotateY(0deg);
            opacity: 1;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease-out;
        }

        .glossary-term {
            text-decoration: underline;
            text-decoration-style: dashed;
            text-decoration-color: #cc5500;
            cursor: help;
            position: relative;
        }

        .glossary-term:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 120%; left: 50%;
            transform: translateX(-50%);
            background: #2d2115;
            color: #fdf5e6;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Courier Prime', monospace;
            font-size: 0.85rem;
            white-space: normal;
            width: max-content;
            max-width: 250px;
            text-align: center;
            z-index: 100;
            line-height: 1.4;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .lamp-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2d2115;
            color: #fdf5e6;
            padding: 10px 15px;
            border-radius: 30px;

        /* Timeline styles */

        .timeline-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }

        .tab-active { background-color: #fdf5e6; color: #4a3728; border-left: 4px solid #cc5500; font-weight: bold; }
    </style>
</head>

    <script>
        // Web Audio API for a synthesized paper rustle sound
        function playPageTurnSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                // Create a short burst of noise
                const bufferSize = ctx.sampleRate * 0.12; // 120ms
                const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    // White noise with exponential decay to simulate a crisp paper snap/rustle
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.02));
                }
                
                const noise = ctx.createBufferSource();
                noise.buffer = buffer;
                
                // Filter the noise to sound less like TV static and more like paper
                const filter = ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 1000;
                
                const filter2 = ctx.createBiquadFilter();
                filter2.type = 'lowpass';
                filter2.frequency.value = 5000;
                
                const gain = ctx.createGain();
                gain.gain.value = 0.5; // Moderate volume
                
                noise.connect(filter);
                filter.connect(filter2);
                filter2.connect(gain);
                gain.connect(ctx.destination);
                
                noise.start();
            } catch (e) {
                console.log("Audio skipped or unsupported.");
            }
        }

                age: 13,
                hasStain: false,
                text: "Dear Diary,\n\nDAY 444. It is finally over.\n\nToday Ronald Reagan was sworn in. And literally minutes after he took the oath of office, the news broke: the planes carrying the 52 hostages had left Iranian airspace. They are on their way to West Germany, and then... they are coming home.\n\nDad poured a glass of champagne, and Mom hugged me so tight. The yellow ribbon on our oak tree is dirty and frayed from the snow, but we can finally take it down. \n\n444 days. I started this diary as a kid who just cared about disco and roller skates. Now I feel like I've watched the whole world shift. I think I'm going to put this notebook in my closet for a long time. \n\nWelcome home."
            }
        ];

        let currentEntryId = diaryEntries[0].id;

        // DOM Elements
        const timelineEl = document.getElementById('timeline');
        const entryDateEl = document.getElementById('entry-date');
        const entryAgeEl = document.getElementById('entry-age');
        const entryTextEl = document.getElementById('entry-text');
        const diaryContainer = document.getElementById('diary-container');
        const lampToggle = document.getElementById('lamp-toggle');
        const lampText = document.getElementById('lamp-text');
        const ribbonContainer = document.getElementById('ribbon-container');
        const stain1 = document.getElementById('coffee-stain-1');
        const stain2 = document.getElementById('coffee-stain-2');

        function init() {
            renderTimeline();
            renderEntry(currentEntryId);

            // Lighting Toggle Logic
            lampToggle.addEventListener('click', () => {
                const isOff = document.body.classList.contains('lamp-off');
                if (isOff) {
                    document.body.classList.remove('lamp-off');
                    document.body.classList.add('lamp-on');
                    lampText.textContent = "Desk Lamp: ON";
                } else {
                    document.body.classList.remove('lamp-on');
                    document.body.classList.add('lamp-off');
                    lampText.textContent = "Desk Lamp: OFF";
                }
            });
        }

        function renderTimeline() {
            timelineEl.innerHTML = '';
            diaryEntries.forEach(entry => {
                const btn = document.createElement('button');
                const isActive = entry.id === currentEntryId;
                
                btn.className = `text-left px-3 py-2 rounded-r md:rounded-l md:rounded-r-none transition-all duration-200 text-sm whitespace-nowrap md:whitespace-normal
                    ${isActive ? 'tab-active' : 'text-70s-brown hover:bg-70s-orange hover:text-paper border-l-4 border-transparent'}`;
                
                btn.innerHTML = `<span class="block font-bold">${entry.shortDate}</span>`;
                
                btn.onclick = () => {
                    if (currentEntryId !== entry.id) {
                        currentEntryId = entry.id;
                        updateTimelineStyles();
                        transitionEntry(entry.id);
                    }
                };
                timelineEl.appendChild(btn);
            });
        }

        function updateTimelineStyles() {
            const buttons = timelineEl.querySelectorAll('button');
            buttons.forEach((btn, index) => {
                const entry = diaryEntries[index];
                if (entry.id === currentEntryId) {
                    btn.className = 'text-left px-3 py-2 rounded-r md:rounded-l md:rounded-r-none transition-all duration-200 text-sm whitespace-nowrap md:whitespace-normal tab-active';
                } else {
                    btn.className = 'text-left px-3 py-2 rounded-r md:rounded-l md:rounded-r-none transition-all duration-200 text-sm whitespace-nowrap md:whitespace-normal text-70s-brown hover:bg-70s-orange hover:text-paper border-l-4 border-transparent';
                }
            });
        }

        function transitionEntry(id) {
            // Trigger flip out
            diaryContainer.classList.remove('page-flip-in');
            diaryContainer.classList.add('page-flip-out');
            
            playPageTurnSound();

            setTimeout(() => {
                renderEntry(id);
                // Trigger flip in
                diaryContainer.classList.remove('page-flip-out');
                diaryContainer.classList.add('page-flip-in');
            }, 400); // Matches the CSS transition duration
        }

        function renderEntry(id) {
            const entry = diaryEntries.find(e => e.id === id);
            if (!entry) return;

            entryDateEl.textContent = entry.fullDate;
            entryAgeEl.textContent = `Age: ${entry.age}`;
            
            // Build the content HTML
            let contentHtml = '';
            if (entry.ephemera) {
                contentHtml += entry.ephemera;
            }
            contentHtml += entry.text.replace(/\n/g, '<br>');
            entryTextEl.innerHTML = contentHtml;

            // Handle the Yellow Ribbon (Show only in 1980 and Jan 1981)
            const yearStr = entry.id.split('-')[1];
            if (yearStr === '1980' || entry.id === 'jan-1981') {
                ribbonContainer.classList.add('visible');
            } else {
                ribbonContainer.classList.remove('visible');
            }

            // Handle coffee stains for realism variation
            if (entry.hasStain) {
                stain1.style.opacity = Math.random() > 0.5 ? '0.6' : '0';
                stain2.style.opacity = Math.random() > 0.5 ? '0.5' : '0';
            } else {
                stain1.style.opacity = '0';
                stain2.style.opacity = '0';
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
